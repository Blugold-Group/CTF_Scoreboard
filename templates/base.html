<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Blugold Cybersecurity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    {% block style %}{% endblock %}
</head>
    <body>
        <!-- Header -->
        <div id="website-header">
            <h1>Blugold Cybersecurity</h1>
        </div>
        <!-- Navigation Menu -->
        <div id="button-container" class="invis-div">
            <button><a href="/">Home</a></button>
            <button><a href="/about">About Us</a></button>
            <button><a href="./join">Join Our Club</a></button>
            <button><a href="/calendar" target="_blank">Meeting Calendar</a></button>
            <button><a href="/discord" target="_blank">Join the Discord</a></button>
        </div>

        {% block content %}{% endblock %}

        <!-- Footer -->
        <div>
            <footer>
                <div>
                    <span><a href="./about">About</a></span>
                </div>

                <span class="footer-item-seperator">|</span>

                <div>
                    <span><a href="./discord">Discord</a></span>
                </div>

                <span class="footer-item-seperator">|</span>

                <div>
                    <span><a href="./github">GitHub</a></span>
                </div>
                
                <span class="footer-item-seperator">|</span>

                <div>
                    <span><a href="mailto:cyberclub@uwec.edu">Email</a></span>
                </div>
            </footer>
        </div>
    </body>
</html>
